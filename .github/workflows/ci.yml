name: CI

on:
  push:
    branches: [main, web-ui]
  pull_request:
    branches: [main, web-ui]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m ruff check .
      - run: python -m pytest -q
